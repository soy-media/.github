name: Notify Slack

on:
  push:
    branches:
      - main
      - dev
      - prod
  pull_request:
    types: [opened, closed]

jobs:
  slack-notify:
    runs-on: ubuntu-latest
    
    steps:
      - name: Send Slack Notification
        run: |
          STATUS=""

          if [[ "${{ github.event_name }}" == "push" ]]; then
            STATUS="🚀 Push to *${{ github.ref }}* by *${{ github.actor }}*\nCommit: ${{ github.event.head_commit.message }}"
          elif [[ "${{ github.event.pull_request.merged }}" == "true" ]]; then
            STATUS="🎉 Pull Request *merged*: ${{ github.event.pull_request.title }} by *${{ github.actor }}*"
          else
            STATUS="📌 Pull Request *${{ github.event.action }}*: ${{ github.event.pull_request.title }} by *${{ github.actor }}*"
          fi

          curl -X POST -H 'Content-type: application/json' --data "{
            \"text\": \"${STATUS}\n🔗 ${{ github.event.pull_request.html_url || github.event.head_commit.url }}\"
          }" $SLACK_WEBHOOK_URL
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
